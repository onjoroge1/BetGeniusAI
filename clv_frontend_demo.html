<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetGenius AI - CLV Monitoring Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #3498db;
        }

        .card.positive {
            border-left-color: #27ae60;
        }

        .card.negative {
            border-left-color: #e74c3c;
        }

        .card.warning {
            border-left-color: #f39c12;
        }

        .card h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .metric-value {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .clv-positive {
            color: #27ae60;
        }

        .clv-negative {
            color: #e74c3c;
        }

        .clv-neutral {
            color: #f39c12;
        }

        .opportunities {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .opportunity {
            border: 1px solid #ecf0f1;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background: #f8f9fa;
        }

        .opportunity.high-clv {
            border-left: 4px solid #27ae60;
            background: #d5f4e6;
        }

        .opportunity.medium-clv {
            border-left: 4px solid #f39c12;
            background: #fef9e7;
        }

        .opportunity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .match-info {
            font-weight: bold;
            color: #2c3e50;
        }

        .clv-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .clv-badge.high {
            background: #27ae60;
            color: white;
        }

        .clv-badge.medium {
            background: #f39c12;
            color: white;
        }

        .odds-comparison {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin: 10px 0;
        }

        .odds-item {
            text-align: center;
            padding: 8px;
            background: white;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        .odds-label {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 4px;
        }

        .odds-value {
            font-weight: bold;
            color: #2c3e50;
        }

        .recommendation {
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
        }

        .recommendation.bet {
            background: #d5f4e6;
            color: #27ae60;
            border: 1px solid #27ae60;
        }

        .recommendation.consider {
            background: #fef9e7;
            color: #f39c12;
            border: 1px solid #f39c12;
        }

        .recommendation.avoid {
            background: #fadbd8;
            color: #e74c3c;
            border: 1px solid #e74c3c;
        }

        .controls {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .controls h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .control-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-item label {
            font-weight: bold;
            color: #555;
            font-size: 0.9rem;
        }

        .control-item input,
        .control-item select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #2980b9;
        }

        .btn.primary {
            background: #27ae60;
        }

        .btn.primary:hover {
            background: #229954;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-active {
            background: #27ae60;
        }

        .status-warning {
            background: #f39c12;
        }

        .status-error {
            background: #e74c3c;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .control-group {
                flex-direction: column;
            }
            
            .odds-comparison {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>BetGenius AI - CLV Monitor</h1>
            <p>Real-time Closing Line Value analysis for optimal betting opportunities</p>
        </div>

        <div class="controls">
            <h3>CLV Monitoring Controls</h3>
            <div class="control-group">
                <div class="control-item">
                    <label for="minClv">Minimum CLV %</label>
                    <input type="number" id="minClv" value="2.0" step="0.5" min="0" max="20">
                </div>
                <div class="control-item">
                    <label for="confidence">Confidence Level</label>
                    <select id="confidence">
                        <option value="">All Levels</option>
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                </div>
                <div class="control-item">
                    <label for="leagueIds">League IDs (comma-separated)</label>
                    <input type="text" id="leagueIds" placeholder="39,140,78,135,61">
                </div>
                <div class="control-item">
                    <label for="matchId">Specific Match ID</label>
                    <input type="number" id="matchId" placeholder="1378978">
                </div>
            </div>
            <div class="control-group">
                <button class="btn primary" onclick="refreshDashboard()">Refresh Dashboard</button>
                <button class="btn" onclick="getOpportunities()">Get Opportunities</button>
                <button class="btn" onclick="analyzeMatch()">Analyze Match</button>
                <button class="btn" onclick="toggleAutoRefresh()">
                    <span id="autoRefreshText">Start Auto-Refresh</span>
                </button>
            </div>
        </div>

        <div class="dashboard" id="dashboard">
            <div class="card">
                <h3><span class="status-indicator status-active"></span>System Status</h3>
                <div class="loading">Loading dashboard data...</div>
            </div>
        </div>

        <div class="opportunities" id="opportunities">
            <h3>Live CLV Opportunities</h3>
            <div class="loading">Loading opportunities...</div>
        </div>

        <div class="footer">
            <p>Last updated: <span id="lastUpdated">--</span></p>
            <p>Auto-refresh: <span id="autoStatus">Disabled</span></p>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;
        let isAutoRefreshing = false;

        // API configuration
        const API_BASE = '';
        const API_KEY = 'betgenius_secure_key_2024';
        const headers = {
            'Authorization': `Bearer ${API_KEY}`,
            'Content-Type': 'application/json'
        };

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            refreshDashboard();
            getOpportunities();
        });

        async function apiCall(endpoint) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, { headers });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        async function refreshDashboard() {
            try {
                const data = await apiCall('/clv/dashboard');
                renderDashboard(data);
                updateLastUpdated();
            } catch (error) {
                renderError('dashboard', 'Failed to load dashboard data');
            }
        }

        async function getOpportunities() {
            try {
                const minClv = document.getElementById('minClv').value;
                const confidence = document.getElementById('confidence').value;
                const leagueIds = document.getElementById('leagueIds').value;
                
                let endpoint = `/clv/opportunities?min_clv=${minClv}`;
                if (confidence) endpoint += `&confidence=${confidence}`;
                if (leagueIds) endpoint += `&league_ids=${leagueIds}`;
                
                const data = await apiCall(endpoint);
                renderOpportunities(data.opportunities);
                updateLastUpdated();
            } catch (error) {
                renderError('opportunities', 'Failed to load opportunities');
            }
        }

        async function analyzeMatch() {
            const matchId = document.getElementById('matchId').value;
            if (!matchId) {
                alert('Please enter a match ID');
                return;
            }

            try {
                const data = await apiCall(`/clv/match/${matchId}`);
                renderMatchAnalysis(data);
                updateLastUpdated();
            } catch (error) {
                renderError('opportunities', `Failed to analyze match ${matchId}`);
            }
        }

        function renderDashboard(data) {
            const dashboard = document.getElementById('dashboard');
            const summary = data.summary;
            
            dashboard.innerHTML = `
                <div class="card positive">
                    <h3><span class="status-indicator status-active"></span>Active Matches</h3>
                    <div class="metric">
                        <span>Total Matches</span>
                        <span class="metric-value">${summary.active_matches}</span>
                    </div>
                    <div class="metric">
                        <span>CLV Opportunities</span>
                        <span class="metric-value clv-positive">${summary.positive_clv_opportunities}</span>
                    </div>
                </div>

                <div class="card ${summary.significant_movements_6h > 0 ? 'warning' : ''}">
                    <h3><span class="status-indicator ${summary.significant_movements_6h > 0 ? 'status-warning' : 'status-active'}"></span>Market Activity</h3>
                    <div class="metric">
                        <span>Significant Movements (6h)</span>
                        <span class="metric-value">${summary.significant_movements_6h}</span>
                    </div>
                    <div class="metric">
                        <span>Bookmakers Tracked</span>
                        <span class="metric-value">${summary.bookmakers_tracked}</span>
                    </div>
                </div>

                <div class="card">
                    <h3><span class="status-indicator status-active"></span>Top Bookmakers</h3>
                    ${data.top_bookmakers.slice(0, 3).map(book => `
                        <div class="metric">
                            <span>Book ${book.book_id} ${book.is_premium ? '⭐' : ''}</span>
                            <span class="metric-value">${book.avg_odds.toFixed(2)}</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderOpportunities(opportunities) {
            const container = document.getElementById('opportunities');
            
            if (!opportunities || opportunities.length === 0) {
                container.innerHTML = `
                    <h3>Live CLV Opportunities</h3>
                    <div class="opportunity">
                        <p>No CLV opportunities found with current filters.</p>
                        <p>Try lowering the minimum CLV threshold or removing filters.</p>
                    </div>
                `;
                return;
            }

            const opportunityHTML = opportunities.map(opp => {
                const clvClass = opp.clv_percentage >= 3 ? 'high-clv' : 'medium-clv';
                const clvBadgeClass = opp.clv_percentage >= 3 ? 'high' : 'medium';
                const recClass = opp.recommendation.includes('STRONG') || opp.recommendation.includes('BET') ? 'bet' : 
                                opp.recommendation.includes('CONSIDER') ? 'consider' : 'avoid';

                return `
                    <div class="opportunity ${clvClass}">
                        <div class="opportunity-header">
                            <div class="match-info">Match ${opp.match_id} - ${opp.outcome}</div>
                            <div class="clv-badge ${clvBadgeClass}">+${opp.clv_percentage.toFixed(2)}% CLV</div>
                        </div>
                        
                        <div class="odds-comparison">
                            <div class="odds-item">
                                <div class="odds-label">Best Odds</div>
                                <div class="odds-value">${opp.best_odds.toFixed(3)}</div>
                            </div>
                            <div class="odds-item">
                                <div class="odds-label">Market Odds</div>
                                <div class="odds-value">${opp.market_odds.toFixed(3)}</div>
                            </div>
                            <div class="odds-item">
                                <div class="odds-label">Best Book</div>
                                <div class="odds-value">${opp.best_bookmaker}</div>
                            </div>
                            <div class="odds-item">
                                <div class="odds-label">Confidence</div>
                                <div class="odds-value">${opp.confidence_level}</div>
                            </div>
                        </div>
                        
                        <div class="recommendation ${recClass}">
                            ${opp.recommendation}
                        </div>
                        
                        <div style="margin-top: 8px; color: #666; font-size: 0.9rem;">
                            Time to kickoff: ${opp.time_to_kickoff_hours.toFixed(1)}h
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                <h3>Live CLV Opportunities (${opportunities.length})</h3>
                ${opportunityHTML}
            `;
        }

        function renderMatchAnalysis(data) {
            const container = document.getElementById('opportunities');
            
            container.innerHTML = `
                <h3>Match Analysis: ${data.home_team} vs ${data.away_team}</h3>
                <div class="opportunity">
                    <div class="match-info">League ${data.league_id} - Overall: ${data.overall_recommendation}</div>
                </div>
                ${data.opportunities.map(opp => {
                    const clvClass = opp.clv_percentage >= 3 ? 'high-clv' : 'medium-clv';
                    const clvBadgeClass = opp.clv_percentage >= 3 ? 'high' : 'medium';
                    const recClass = opp.recommendation.includes('STRONG') || opp.recommendation.includes('BET') ? 'bet' : 
                                    opp.recommendation.includes('CONSIDER') ? 'consider' : 'avoid';

                    return `
                        <div class="opportunity ${clvClass}">
                            <div class="opportunity-header">
                                <div class="match-info">Outcome: ${opp.outcome}</div>
                                <div class="clv-badge ${clvBadgeClass}">${opp.clv_percentage >= 0 ? '+' : ''}${opp.clv_percentage.toFixed(2)}% CLV</div>
                            </div>
                            
                            <div class="odds-comparison">
                                <div class="odds-item">
                                    <div class="odds-label">Best Odds</div>
                                    <div class="odds-value">${opp.best_odds.toFixed(3)}</div>
                                </div>
                                <div class="odds-item">
                                    <div class="odds-label">Market Odds</div>
                                    <div class="odds-value">${opp.market_odds.toFixed(3)}</div>
                                </div>
                                <div class="odds-item">
                                    <div class="odds-label">Best Book</div>
                                    <div class="odds-value">${opp.best_bookmaker}</div>
                                </div>
                                <div class="odds-item">
                                    <div class="odds-label">Confidence</div>
                                    <div class="odds-value">${opp.confidence_level}</div>
                                </div>
                            </div>
                            
                            <div class="recommendation ${recClass}">
                                ${opp.recommendation}
                            </div>
                        </div>
                    `;
                }).join('')}
            `;
        }

        function renderError(containerId, message) {
            const container = document.getElementById(containerId);
            container.innerHTML = `<div class="loading" style="color: #e74c3c;">${message}</div>`;
        }

        function updateLastUpdated() {
            document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
        }

        function toggleAutoRefresh() {
            const button = document.getElementById('autoRefreshText');
            const status = document.getElementById('autoStatus');
            
            if (isAutoRefreshing) {
                clearInterval(autoRefreshInterval);
                button.textContent = 'Start Auto-Refresh';
                status.textContent = 'Disabled';
                isAutoRefreshing = false;
            } else {
                autoRefreshInterval = setInterval(() => {
                    refreshDashboard();
                    getOpportunities();
                }, 30000); // Refresh every 30 seconds
                button.textContent = 'Stop Auto-Refresh';
                status.textContent = 'Active (30s)';
                isAutoRefreshing = true;
            }
        }

        // CLV Education tooltips
        function showCLVInfo() {
            alert(`CLV (Closing Line Value) Explanation:

🟢 +3% or higher: STRONG BET - Excellent opportunity
🟡 +2% to +3%: GOOD BET - Worth considering  
🔵 0% to +2%: MONITOR - Wait for better value
🔴 Negative CLV: AVOID - Poor value

CLV fluctuates constantly. When positive, it indicates the market is offering better odds than the true probability suggests.`);
        }

        // Add CLV info button
        document.querySelector('.header p').innerHTML += 
            ` <button onclick="showCLVInfo()" style="background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; margin-left: 10px;">CLV Info</button>`;
    </script>
</body>
</html>

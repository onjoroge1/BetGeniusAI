    timing:
      optimal_window_hours: [12, 3]
      avoid_window_hours: [1, 0]
      clv_threshold: 0.52
      min_edge_threshold: 0.025
    
    market:
      home_advantage: 0.24
      competitiveness: 0.80
      volatility: "medium"
      liquidity: "high"
      
    operations:
      max_matches_per_day: 8
      max_stake_percentage: 0.04
      kelly_fraction: 0.25
      

    timing:
      optimal_window_hours: [18, 4]
      avoid_window_hours: [2, 0]
      clv_threshold: 0.48
      min_edge_threshold: 0.03
    
    market:
      home_advantage: 0.21
      competitiveness: 0.78
      volatility: "low"
      liquidity: "medium"
      
    operations:
      max_matches_per_day: 6

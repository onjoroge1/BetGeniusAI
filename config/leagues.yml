# League Configuration
# Per-league settings for calibration, timing windows, and CLV thresholds

leagues:
  39:  # English Premier League
    name: "English Premier League"
    region: "England"
    tier: 1
    
    # Calibration settings
    calibration:
      min_samples_per_bucket: 50
      buckets: ["24h", "6h", "1h", "close"]
      recalibration_frequency_days: 30
    
    # Timing windows (backtested CLV >= 55%)
    timing:
      optimal_window_hours: [24, 6]  # Best CLV observed 24-6h before KO
      avoid_window_hours: [1, 0]     # Poor CLV in last hour
      clv_threshold: 0.55
      min_edge_threshold: 0.02       # Minimum edge to trigger bet
    
    # Market characteristics
    market:
      home_advantage: 0.22
      competitiveness: 0.85
      volatility: "medium"
      liquidity: "high"
      
    # Operational settings
    operations:
      max_matches_per_day: 10
      max_stake_percentage: 0.05     # 5% of bankroll per match
      kelly_fraction: 0.25           # Quarter Kelly
      
  140:  # La Liga Santander
    name: "La Liga Santander"
    region: "Spain"
    tier: 1
    
    calibration:
      min_samples_per_bucket: 40

# Global settings
global:
  # Default calibration
  default_calibration:
    min_samples_per_bucket: 30
    buckets: ["24h", "6h", "1h"]
    recalibration_frequency_days: 30
  
  # Default timing
  default_timing:
    optimal_window_hours: [24, 6]
    avoid_window_hours: [1, 0]
    clv_threshold: 0.50
    min_edge_threshold: 0.03
  
  # Risk management
  risk_management:
    max_total_exposure: 0.20       # 20% of bankroll across all bets
    max_correlated_exposure: 0.10  # 10% in correlated matches (same league/day)
    stop_loss_threshold: -0.05     # Stop if down 5% from peak
    drawdown_pause_threshold: -0.15 # Pause betting if down 15%
  
  # Quality gates
  quality_gates:
    min_logloss_vs_market: -0.005  # Must beat market by 0.005 LogLoss points
    min_weekly_matches: 10         # Minimum matches for reliable evaluation
    max_dispersion_threshold: 0.15 # Flag high-uncertainty predictions
    
  # Monitoring
  monitoring:
    weekly_report_day: "sunday"
    alert_channels: ["email", "slack"]
    performance_window_days: 30
    clv_tracking_enabled: true